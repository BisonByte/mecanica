<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Viga</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 text-gray-900">
  <div id="root" class="p-4"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [longitud, setLongitud] = useState(10);
      const [resultado, setResultado] = useState(null);
      const [seccion, setSeccion] = useState({ b1: 20, h1: 5, b2: 5, h2: 30, b3: 15, h3: 5 });
      const [propSeccion, setPropSeccion] = useState(null);

      async function calcular() {
        const data = { longitud, cargas_puntuales: [], cargas_distribuidas: [] };
        const res = await axios.post('/calcular_reacciones', data);
        setResultado(res.data);
      }

      async function calcularSeccion() {
        const res = await axios.post('/propiedades_seccion', seccion);
        setPropSeccion(res.data);
      }

      return (
          <div className="max-w-xl mx-auto">
            <h1 className="text-2xl font-bold mb-4">Simulador de Viga</h1>
            <label className="block mb-2">
              Longitud (m)
              <input type="number" value={longitud} onChange={e => setLongitud(+e.target.value)} className="border p-1 ml-2" />
            </label>
            <button onClick={calcular} className="bg-blue-500 text-white px-4 py-2 rounded mr-2">Calcular Reacciones</button>
            {resultado && (
              <pre className="mt-4 bg-white p-2 border rounded">{JSON.stringify(resultado, null, 2)}</pre>
            )}

            <h2 className="text-xl font-bold mt-6">Propiedades de Sección</h2>
            <div className="grid grid-cols-2 gap-2 mt-2">
              {Object.keys(seccion).map(key => (
                <label key={key} className="block">
                  {key.toUpperCase()}
                  <input type="number" value={seccion[key]} onChange={e => setSeccion({ ...seccion, [key]: +e.target.value })} className="border p-1 ml-2" />
                </label>
              ))}
            </div>
            <button onClick={calcularSeccion} className="bg-green-600 text-white px-4 py-2 rounded mt-2">Calcular Sección</button>
            {propSeccion && (
              <pre className="mt-4 bg-white p-2 border rounded">{JSON.stringify(propSeccion, null, 2)}</pre>
            )}
          </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
